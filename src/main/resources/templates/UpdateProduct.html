<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>

<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">

    <!-- Page Header -->
    <div class="app-header text-center">
        <h2>Update Product</h2>
        <p class="text-muted">Edit the product details below</p>
    </div>

    <!-- Card -->
    <div class="product-card" style="max-width: 500px; margin: 0 auto; padding: 25px;">

        <form th:action="@{/update-product/{id}(id=${product.id})}"
              th:object="${product}"
              method="post"
              style="display: flex; flex-direction: column; gap: 18px;">

            <input type="hidden" th:field="*{id}" />

            <!-- Product Name -->
            <div>
                <label style="font-weight:600; margin-bottom:5px;">Product Name</label>
                <input type="text"
                       th:field="*{name}"
                       placeholder="Enter product name"
                       style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
            </div>

            <!-- Price -->
            <div>
                <label style="font-weight:600; margin-bottom:5px;">Price</label>
                <input type="number"
                       step="0.01"
                       th:field="*{price}"
                       placeholder="Enter price"
                       style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
            </div>

            <!-- Quantity -->
            <div>
                <label style="font-weight:600; margin-bottom:5px;">Quantity</label>
                <input type="number"
                       th:field="*{quantity}"
                       placeholder="Enter quantity"
                       style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
            </div>

            <!-- Buttons -->
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button type="submit"
                        style="flex:1; padding:10px; background-color:#007bff; color:white; border:none; border-radius:4px; font-weight:600; cursor:pointer;">
                    Update Product
                </button>

                <a th:href="@{/products}"
                   style="flex:1; text-align:center; padding:10px; background-color:#6c757d; color:white; border-radius:4px; text-decoration:none; font-weight:600;">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

<div th:insert="fragments/base :: assetsScripts"></div>

</body>
</html>
