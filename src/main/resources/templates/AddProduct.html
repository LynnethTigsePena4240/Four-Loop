<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <th:block th:replace="~{fragments/base :: assetsHead}"></th:block>
</head>

<body>

    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="app-container">
        <div class="app-header">
            <h2 class="mb-4">Add Product</h2>
        </div>

        <div class="product-card">
            <form th:action="@{/inventory/add}" th:object="${product}" method="post" novalidate>

                <div class="mb-3">
                    <label for="name" class="form-label">Product Name</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}"
                        th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                        Name Error.
                    </div>
                </div>


                <div class="mb-3">
                    <label for="price" class="form-label">Price</label>
                    <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}"
                        th:classappend="${#fields.hasErrors('price')} ? ' is-invalid' : ''" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">
                        Price Error.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="quantity" class="form-label">Quantity</label>
                    <input type="number" class="form-control" id="quantity" th:field="*{quantity}"
                        th:classappend="${#fields.hasErrors('quantity')} ? ' is-invalid' : ''" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}">
                        Quantity Error.
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg">Add Product</button>
                <a th:href="@{/products}" class="btn btn-secondary btn-lg">Cancel</a>
            </form>
        </div>
    </div>

    <th:block th:replace="~{fragments/base :: assetsScripts}"></th:block>
</body>

</html>
