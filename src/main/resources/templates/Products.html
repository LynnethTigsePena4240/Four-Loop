<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Products Page</title>
    <th:block th:replace="fragments/base :: assetsHead"></th:block>
</head>
<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<main class="app-container">

    <section class="product-card product-card-clear">
        <div class="products-header">
            <div>
                <h2 class="products-title">Products</h2>
                <p class="products-subtitle">Browse, sort, and manage available products.</p>
            </div>

            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/Add-Product}" class="btn btn-dark shadow-sm">
                    Add Product
                </a>
            </div>
        </div>

        <form method="get" th:action="@{/products}" class="products-toolbar">
            <input type="hidden" name="page" value="0">
            <input type="hidden" name="direction" th:value="${direction}">

            <div class="toolbar-group search-group">
                <label for="search-input">Search by product name</label>
                <input
                    type="text"
                    id="search-input"
                    name="search"
                    th:value="${search}"
                    placeholder="Enter product name...">
            </div>

            <div class="toolbar-group">
                <label for="sort-select">Sort By</label>
                <select id="sort-select" name="sort" onchange="this.form.submit();">
                    <option value="name" th:selected="${sort == 'name'}">Product Name</option>
                    <option value="id" th:selected="${sort == 'id'}">Product ID</option>
                    <option value="price" th:selected="${sort == 'price'}">Price</option>
                </select>
            </div>

            <div class="toolbar-group">
                <label for="size-select">Per Page</label>
                <select id="size-select" name="size" onchange="this.form.submit();">
                    <option value="10" th:selected="${size == 10}">10</option>
                    <option value="25" th:selected="${size == 25}">25</option>
                    <option value="50" th:selected="${size == 50}">50</option>
                </select>
            </div>

            <div class="toolbar-actions">
                <button type="submit">Search</button>
                <a th:href="@{/products}">Reset</a>
            </div>
        </form>
    </section>

    <section class="products-table-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">
                        <a th:href="@{/products(search=${search}, page=${currentPage}, size=${size}, sort='id', direction=${sort == 'id' and direction == 'ASC' ? 'DESC' : 'ASC'})}">
                            ID
                            <span th:if="${sort == 'id'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/products(search=${search}, page=${currentPage}, size=${size}, sort='name', direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'})}">
                            Name
                            <span th:if="${sort == 'name'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/products(search=${search}, page=${currentPage}, size=${size}, sort='price', direction=${sort == 'price' and direction == 'ASC' ? 'DESC' : 'ASC'})}">
                            Price
                            <span th:if="${sort == 'price'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                        </a>
                    </th>

                    <th scope="col" sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}">1</td>
                    <td th:text="${product.name}">Electronic</td>
                    <td th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}">$0.00</td>

                    <td sec:authorize="hasRole('ADMIN')">
                        <div class="table-actions">
                            <a th:href="@{/update-product/{id}(id=${product.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            <a th:href="@{/delete-product/{id}(id=${product.id})}" class="btn btn-sm btn-outline-danger">Delete</a>
                        </div>
                    </td>
                </tr>

                <tr th:if="${products.isEmpty()}">
                    <td colspan="5" class="empty-state">No products found</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination-container">
            <span>
                Showing <span th:text="${startIndex}">1</span> to
                <span th:text="${endIndex}">10</span> of
                <span th:text="${totalElements}">100</span> entries
            </span>

            <div class="pagination-controls">
                <a th:if="${currentPage > 0}"
                   th:href="@{/products(search=${search}, page=0, size=${size}, sort=${sort}, direction=${direction})}">
                    « First
                </a>
                <span th:if="${currentPage == 0}">« First</span>

                <a th:if="${hasPrevious}"
                   th:href="@{/products(search=${search}, page=${currentPage - 1}, size=${size}, sort=${sort}, direction=${direction})}">
                    ‹ Prev
                </a>
                <span th:if="${!hasPrevious}">‹ Prev</span>

                <span>
                    Page <span th:text="${currentPage + 1}">1</span> of
                    <span th:text="${totalPages}">5</span>
                </span>

                <a th:if="${hasNext}"
                   th:href="@{/products(search=${search}, page=${currentPage + 1}, size=${size}, sort=${sort}, direction=${direction})}">
                    Next ›
                </a>
                <span th:if="${!hasNext}">Next ›</span>

                <a th:if="${currentPage < totalPages - 1}"
                   th:href="@{/products(search=${search}, page=${totalPages - 1}, size=${size}, sort=${sort}, direction=${direction})}">
                    Last »
                </a>
                <span th:if="${currentPage >= totalPages - 1}">Last »</span>
            </div>
        </div>
    </section>

</main>

<th:block th:replace="fragments/base :: assetsScripts"></th:block>
</body>
</html>
