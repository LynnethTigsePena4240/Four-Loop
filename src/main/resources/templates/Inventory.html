<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management | Four Loop</title>
    <th:block th:replace="~{fragments/base :: assetsHead}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="app-container">

    <section class="product-card product-card-clear">
        <div class="products-header">
            <div>
                <h2 class="products-title">Inventory Dashboard</h2>
                <p class="products-subtitle">Search, sort, and manage product stock levels.</p>
            </div>

            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/inventory/add}" class="btn btn-dark shadow-sm">Add New Product</a>
            </div>
        </div>

        <form method="get" th:action="@{/inventory}" class="products-toolbar">
            <input type="hidden" name="page" value="0">
            <input type="hidden" name="direction" th:value="${direction}">

            <div class="toolbar-group search-group">
                <label for="inventory-search">Search Products</label>
                <input
                    type="text"
                    id="inventory-search"
                    name="search"
                    th:value="${search}"
                    placeholder="Enter product name...">
            </div>

            <div class="toolbar-group">
                <label for="inventory-sort">Sort By</label>
                <select id="inventory-sort" name="sort" onchange="this.form.submit();">
                    <option value="name" th:selected="${sort == 'name'}">Product Name</option>
                    <option value="id" th:selected="${sort == 'id'}">Product ID</option>
                    <option value="quantity" th:selected="${sort == 'quantity'}">Quantity</option>
                </select>
            </div>

            <div class="toolbar-actions">
                <button type="submit">Search</button>
                <a th:href="@{/inventory}">Reset</a>
            </div>
        </form>
    </section>

    <section class="products-table-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th scope="col">
                            <a th:href="@{/inventory(search=${search}, page=${currentPage}, size=${size}, sort='id', direction=${sort == 'id' and direction == 'ASC' ? 'DESC' : 'ASC'})}">
                            ID
                            <span th:if="${sort == 'id'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                        </a>
                       </th>
                        <th scope="col">
                            <a th:href="@{/inventory(search=${search}, page=${currentPage}, size=${size}, sort='name', direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'})}">
                                Name
                                <span th:if="${sort == 'name'}">
                                    <span th:if="${direction == 'ASC'}">▲</span>
                                    <span th:if="${direction == 'DESC'}">▼</span>
                                </span>
                            </a>
                        </th>
                        <th scope="col">
                            <a th:href="@{/inventory(search=${search}, page=${currentPage}, size=${size}, sort='quantity', direction=${sort == 'quantity' and direction == 'ASC' ? 'DESC' : 'ASC'})}">
                                Quantity
                                <span th:if="${sort == 'quantity'}">
                                    <span th:if="${direction == 'ASC'}">▲</span>
                                    <span th:if="${direction == 'DESC'}">▼</span>
                                </span>
                            </a>
                        </th>
                        <th scope="col">Status</th>
                        <th scope="col" class="text-center">Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}">1</td>
                        <td th:text="${product.name}">Product Name</td>
                        <td th:text="${product.quantity}">0</td>
                        <td>
                            <span th:if="${product.quantity == 0}" class="status-badge status-out">
                                Out of Stock
                            </span>
                            <span th:if="${product.quantity > 0 and product.quantity <= 10}" class="status-badge status-low">
                                Low Stock
                            </span>
                            <span th:if="${product.quantity > 10}" class="status-badge status-in">
                                In Stock
                            </span>
                        </td>
                        <td class="text-center">
                            <div sec:authorize="hasRole('ADMIN')" class="table-actions justify-content-center">
                                <a th:href="@{/inventory/edit/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    Update Stock
                                </a>
                            </div>

                            <div sec:authorize="hasRole('STAFF')">
                                <span class="read-only-badge">Read Only</span>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${products.isEmpty()}">
                        <td colspan="5" class="empty-state">
                            No inventory records found for your search.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination-container">
            <span>
                Showing <span th:text="${startIndex}">1</span> to
                <span th:text="${endIndex}">10</span> of
                <span th:text="${totalElements}">100</span> entries
            </span>

            <div class="pagination-controls">
                <a th:if="${hasPrevious}"
                   th:href="@{/inventory(search=${search}, page=${currentPage - 1}, sort=${sort})}">
                    Prev
                </a>

                <span th:text="${currentPage + 1}">1</span>

                <a th:if="${hasNext}"
                   th:href="@{/inventory(search=${search}, page=${currentPage + 1}, sort=${sort})}">
                    Next
                </a>
            </div>
        </div>
    </section>

</main>

<th:block th:replace="~{fragments/base :: assetsScripts}"></th:block>
</body>
</html>
